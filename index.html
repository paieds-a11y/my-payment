<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ร้านสูตรลับ 20 บาท</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
}

h2 {
  text-align: center;
}

#shop {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  border-radius: 8px;
}

.price {
  color: red;
  font-weight: bold;
}

button {
  margin-top: 5px;
  padding: 8px;
  width: 100%;
  border: none;
  background: black;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

/* 🔥 popup พื้นหลัง */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
}

/* 🔥 กล่อง QR */
#popupBox {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
  margin: 100px auto;
  text-align: center;
}
.title {
  text-align: center;
  font-size: 36px;
  font-weight: bold;
  margin-top: 20px;
}

.subtitle {
  text-align: center;
  font-size: 16px;
  color: #555;
}
</style>

</head>

<body>

<h2 class="title">🔥 สูตรลับทำเงิน 🔥</h2>

<p class="subtitle">
  💰 ทุกไฟล์ 20 บาท <br>
  📥 จ่ายแล้วโหลดทันที
</p>

<div id="shop"></div>

<!-- 🔥 popup -->
<div id="popup" onclick="closePopup(event)">
  <div id="popupBox" onclick="event.stopPropagation()">

    <button onclick="hidePopup()">❌</button>

    <h3>สแกนเพื่อปลดล็อก</h3>
    <img id="qr" width="200"><br><br>
    <p id="status">รอชำระเงิน...</p>

  </div>
</div>

<script>
const products = [
  {
    name: "สูตรชาเย็น",
    file: "money.pdf",
    img: "ชาเย็น.jpg"
  },
  {
    name: "สูตรชานมไข่มุก",
    file: "ชานมไข่มุก.pdf",
    img: "ชานมไข่มุก.jpg"
  },
  {
    name: "สูตรสตอเค็ก",
    file: "สตอเค็ก.pdf",
    img: "สตอเค็ก.jpg"
  }
];
const shop = document.getElementById("shop");

products.forEach(p => {
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <img src="${p.img}">
    <h4>${p.name}</h4>
    <p style="color:orange;">⭐ 4.8 (120 รีวิว)</p>
    <p class="price">฿20</p>
    <button onclick="buy('${p.file}')">ซื้อ</button>
  `;

  shop.appendChild(div);
});

let id = "";
let currentFile = "";
let token = "";

async function buy(file){
  currentFile = file;

  document.getElementById("popup").style.display = "block";
  document.getElementById("status").innerText = "รอชำระเงิน...";

  const res = await fetch("/create", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ file })
  });

  const data = await res.json();

  id = data.id;
    token = data.token;
  document.getElementById("qr").src = data.qr;

  check();
}

function check(){
  const i = setInterval(async ()=>{
    const res = await fetch("/check/"+id);
    const data = await res.json();

    if(data.paid){
      clearInterval(i);
      document.getElementById("status").innerText = "จ่ายแล้ว ✅";

      window.location.href = "/download/" + id + "/" + token;
    }
  },3000);
}

/* 🔥 ปิด popup */
function hidePopup(){
  document.getElementById("popup").style.display = "none";
}

/* 🔥 กดพื้นหลังปิด */
function closePopup(e){
  if(e.target.id === "popup"){
    hidePopup();
  }
}
</script>

</body>
</html>
