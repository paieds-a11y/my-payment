<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สูตรลับ 20 บาท</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
}

.header {
  background: black;
  color: white;
  text-align: center;
  padding: 15px;
}

#shop {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  padding: 12px;
}

.card {
  background: white;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 3px 6px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
  text-align: center;
}

.meta {
  font-size: 12px;
  color: #666;
}

.price {
  color: red;
  font-weight: bold;
}

button {
  width: 100%;
  padding: 8px;
  border: none;
  background: black;
  color: white;
  border-radius: 5px;
}

#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: rgba(0,0,0,0.6);
  display: none;

  justify-content: center;
  align-items: center;

  z-index: 999;
}

#popupBox {
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

</style>
</head>

<body>

<div class="header">
  <h2>🔥 สูตรลับ ทำเงิน สร้างรายได้ 20 บาท</h2>
  <p>จ่ายแล้วโหลดทันที</p>
</div>

<div id="shop"></div>

<div id="popup" onclick="closePopup(event)">
  <div id="popupBox" onclick="event.stopPropagation()">
    <button onclick="hidePopup()">❌</button>
    <h3>สแกนจ่าย</h3>
    <img id="qr" width="200"><br>
    <p id="status">รอชำระเงิน...</p>
  </div>
</div>

<script>
const products = [
  {name:"สูตรลับทำเงิน", file:"money.pdf", img:"https://picsum.photos/200?1"},
  {name:"สูตรสมุนไพรชาย", file:"herb.pdf", img:"https://picsum.photos/200?2"},
  {name:"สูตรออนไลน์", file:"online.pdf", img:"https://picsum.photos/200?3"}
];

let counts = {};

async function loadCounts(){
  const res = await fetch('/count');
  counts = await res.json();
}

const shop = document.getElementById("shop");

async function render(){
  await loadCounts();

  products.forEach(p=>{
    const div=document.createElement("div");
    div.className="card";

    const sold = counts[p.file] || 0;

    div.innerHTML=`
      <img src="${p.img}">
      <div class="card-content">
        <h4>${p.name}</h4>
        <div class="meta">📥 โหลดแล้ว ${sold} ครั้ง</div>
        <div class="price">฿20</div>
        <button onclick="buy('${p.file}')">ซื้อ</button>
      </div>
    `;
    shop.appendChild(div);
  });
}

render();

let id="", token="";

async function buy(file){
  document.getElementById("popup").style.display="flex";

  const res=await fetch("/create",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({file})
  });

  const data=await res.json();

  id=data.id;
  token=data.token;

  document.getElementById("qr").src=data.qr;

  check();
}

function check(){
  const i=setInterval(async()=>{
    const res=await fetch("/check/"+id);
    const data=await res.json();

    if(data.paid){
      clearInterval(i);
      document.getElementById("status").innerText="จ่ายแล้ว ✅";

      window.location.href="/download/"+id+"/"+token;
    }
  },3000);
}

function hidePopup(){
  document.getElementById("popup").style.display="none";
}

function closePopup(e){
  if(e.target.id==="popup"){
    hidePopup();
  }
}
</script>

</body>
</html>
